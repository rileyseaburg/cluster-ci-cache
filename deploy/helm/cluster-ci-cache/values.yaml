image:
  registry: registry.quantum-forge.net
  repository: cluster-ci-cache/ci-cache
  tag: latest
  pullPolicy: Always

server:
  enabled: true
  replicas: 2
  listenAddr: "0.0.0.0:8080"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

agent:
  enabled: true
  listenAddr: "0.0.0.0:8090"
  cacheDir: /var/lib/ci-cache-agent
  maxGB: 10
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

backend:
  # "local" for PVC-backed, "s3" for S3/MinIO
  kind: local
  fsRoot: /var/lib/ci-cache
  bucket: cluster-ci-cache
  endpoint: ""
  region: us-east-1
  accessKeyEnv: CI_CACHE_S3_ACCESS_KEY
  secretKeyEnv: CI_CACHE_S3_SECRET_KEY
  pathStyle: true

cache:
  defaultTtlSeconds: 604800
  compression: zstd
  maxBlobSizeMB: 512
  maxArchiveSizeGB: 10
  dedupe: true

auth:
  mode: service-account
  tokenEnv: CI_CACHE_AUTH_TOKEN

persistence:
  enabled: true
  size: 100Gi
  storageClass: ""

networkPolicy:
  enabled: true

s3Credentials:
  createSecret: false
  accessKey: ""
  secretKey: ""
