---
# ci-cache-agent DaemonSet (node-local cache agent)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ci-cache-agent
  labels:
    app.kubernetes.io/name: cluster-ci-cache
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-ci-cache
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-ci-cache
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: ci-cache-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: agent
          image: registry.quantum-forge.net/cluster-ci-cache/ci-cache:latest
          imagePullPolicy: Always
          command: ["ci-cache-agent"]
          args: ["--addr", "0.0.0.0:8090", "--cache-dir", "/var/lib/ci-cache-agent", "--upstream", "http://ci-cache-server:8080"]
          ports:
            - name: http
              containerPort: 8090
          env:
            - name: RUST_LOG
              value: "info"
          volumeMounts:
            - name: cache
              mountPath: /var/lib/ci-cache-agent
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: cache
          emptyDir: {}
---
# ci-cache-agent Service (headless, for locality-aware lookups)
apiVersion: v1
kind: Service
metadata:
  name: ci-cache-agent
  labels:
    app.kubernetes.io/name: cluster-ci-cache
    app.kubernetes.io/component: agent
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: cluster-ci-cache
    app.kubernetes.io/component: agent
  ports:
    - name: http
      port: 8090
      targetPort: http
      protocol: TCP
