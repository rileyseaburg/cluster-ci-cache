---
# ci-cache-server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-cache-server
  labels:
    app.kubernetes.io/name: cluster-ci-cache
    app.kubernetes.io/component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-ci-cache
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-ci-cache
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: ci-cache-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: server
          image: registry.quantum-forge.net/cluster-ci-cache/ci-cache:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: CI_CACHE_CONFIG
              value: /etc/ci-cache/config.yaml
            - name: RUST_LOG
              value: "info,ci_cache_server=debug"
          volumeMounts:
            - name: config
              mountPath: /etc/ci-cache
              readOnly: true
            - name: data
              mountPath: /var/lib/ci-cache
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: ci-cache-config
        - name: data
          emptyDir: {}
---
# ci-cache-server Service
apiVersion: v1
kind: Service
metadata:
  name: ci-cache-server
  labels:
    app.kubernetes.io/name: cluster-ci-cache
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cluster-ci-cache
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
