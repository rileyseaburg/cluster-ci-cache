# Cluster CI Cache configuration example
# Copy and modify as needed. Mount into the pod or set CI_CACHE_CONFIG env.

server:
  listen_addr: "0.0.0.0:8080"
  max_body_bytes: 536870912  # 512 MiB

backend:
  # "local" for PVC-backed storage, "s3" for MinIO/AWS S3
  kind: "s3"
  fs_root: "/var/lib/ci-cache"
  bucket: "cluster-ci-cache"
  endpoint: "http://minio.minio.svc.cluster.local:9000"
  region: "us-east-1"
  access_key_env: "CI_CACHE_S3_ACCESS_KEY"
  secret_key_env: "CI_CACHE_S3_SECRET_KEY"
  path_style: true

cache:
  default_ttl_seconds: 604800  # 7 days
  compression: "zstd"
  max_blob_size_mb: 512
  max_archive_size_gb: 10
  dedupe: true

auth:
  mode: "service-account"
  token_env: "CI_CACHE_AUTH_TOKEN"
