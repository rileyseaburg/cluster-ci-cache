---
# ci-cache-website Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-cache-website
  labels:
    app.kubernetes.io/name: cluster-ci-cache
    app.kubernetes.io/component: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-ci-cache
      app.kubernetes.io/component: website
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-ci-cache
        app.kubernetes.io/component: website
    spec:
      containers:
        - name: website
          image: registry.quantum-forge.net/cluster-ci-cache/website:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8787
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ci-cache-website
  labels:
    app.kubernetes.io/name: cluster-ci-cache
    app.kubernetes.io/component: website
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cluster-ci-cache
    app.kubernetes.io/component: website
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
